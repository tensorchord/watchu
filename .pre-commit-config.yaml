repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: "v6.0.0"
    hooks:
      - id: trailing-whitespace
      - id: check-added-large-files
      - id: end-of-file-fixer
      - id: check-yaml
      - id: check-json
      - id: check-toml
      - id: check-xml
      - id: mixed-line-ending

  - repo: local
    hooks:
      - id: format
        name: code format
        language: system
        entry: make format
        files: "\\.(go|c|h)$"
