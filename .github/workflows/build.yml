name: Build & Test

on:
  push:
    branches: ["main"]
    paths:
      - ".github/workflows/build.yml"
      - "**.go"
      - "Makefile"
      - "go.**"
      - "**.c"
      - "**.h"
  pull_request:
    branches: ["main"]
    paths:
      - ".github/workflows/build.yml"
      - "**.go"
      - "Makefile"
      - "go.**"
      - "**.c"
      - "**.h"
  merge_group:

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      BUILDER: ghcr.io/tensorchord/ebpf-builder:0.1.2
    steps:
      - uses: actions/checkout@v6

      - name: Build
        run: docker run --rm -v "$PWD":/workspace -w /workspace $BUILDER bash -c "make build && make lint-ebpf"

      - name: golangci-lint
        uses: golangci/golangci-lint-action@v9
